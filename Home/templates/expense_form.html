{% extends 'baseAdmin.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow">
                <div class="card-header bg-danger text-white py-3">
                    <h5 class="mb-0 fw-bold">Record Operational Expense</h5>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Department</label>
                            <select name="department" class="form-select" required>
                                <option value="">Select Department...</option>
                                {% for d in departments %}
                                <option value="{{ d.id }}">{{ d.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Expense Category</label>
                            <input type="text" name="category" class="form-control" placeholder="e.g. Stationery, Electricity, Repairs" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Amount (KES)</label>
                                <input type="number" step="0.01" name="amount" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Date</label>
                                <input type="date" name="expense_date" class="form-control" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Description / Details</label>
                            <textarea name="description" class="form-control" rows="3" placeholder="Provide more details about this payment..."></textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg">Save Expense</button>
                            <a href="{% url 'expense_list' %}" class="btn btn-light">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
            <p class="text-center text-muted mt-3 small">Recorded by: <strong>{{ user.username }}</strong></p>
        </div>
    </div>
</div>
{% endblock %}
